name: 🔄 BI仪表盘自动更新

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"  # 北京时间 12:00

env:
  TZ: Asia/Shanghai

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -q cos-python-sdk-v5 openpyxl pandas python-dateutil

      - name: 解析COS数据并更新仪表盘
        run: python3 scripts/update_dashboard.py
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          TENCENT_COS_BUCKET: ${{ secrets.TENCENT_COS_BUCKET }}
          TENCENT_COS_REGION: ${{ secrets.TENCENT_COS_REGION }}

      - name: 提交并推送
        run: |
          if [ -f .skip ]; then
            echo "⚠️ 无数据更新，跳过推送"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "没有变更，跳过提交"
          else
            git commit -m "🤖 auto-update BI $(date '+%Y-%m-%d %H:%M')"
            git push && echo "✅ 推送成功!"
          fi
